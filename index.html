<style>

<body>

<div id="app"></div>

<!-- Firebase for Google Login -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Firebase config (replace with yours from console.firebase.google.com) ────
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const CLAUDE_API  = "https://api.anthropic.com/v1/messages";
const BACKEND_KEY = "pv_backend_url";
const DEFAULT_BE  = "https://perfume-vault-api.onrender.com";

// ── Init Firebase ─────────────────────────────────────────────────────────────
let auth, db, fbApp;
try {
  fbApp = initializeApp(FIREBASE_CONFIG);
  auth  = getAuth(fbApp);
  db    = getFirestore(fbApp);
} catch(e) { console.log('Firebase not configured, using local storage'); }

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  tab: 0,
  collection: [],
  wishlist: [],
  wishStores: {},
  wishMatches: {},
  profile: null,
  discoveries: [],
  preview: null,
  backendOk: null,
  loadingSearch: false,
  loadingProfile: false,
  loadingDiscover: false,
  loadingPriceId: null,
  errorMsg: "",
  showSettings: false,
  showLogin: false,
  showAddManual: false, // manual fallback
  addManualTarget: null, // 'collection' or 'wishlist'
  user: null,
};

function getBackend() {
  return (localStorage.getItem(BACKEND_KEY) || DEFAULT_BE).replace(/\/$/, "");
}
function setBackend(url) { localStorage.setItem(BACKEND_KEY, url.trim()); }

// ── Persist ───────────────────────────────────────────────────────────────────
function saveLocal() {
  localStorage.setItem("pv_col", JSON.stringify(state.collection));
  localStorage.setItem("pv_wsh", JSON.stringify(state.wishlist));
  localStorage.setItem("pv_wst", JSON.stringify(state.wishStores));
}
function loadLocal() {
  try { state.collection  = JSON.parse(localStorage.getItem("pv_col") || "[]"); } catch {}
  try { state.wishlist    = JSON.parse(localStorage.getItem("pv_wsh") || "[]"); } catch {}
  try { state.wishStores  = JSON.parse(localStorage.getItem("pv_wst") || "{}"); } catch {}
}

// ── Firestore sync ────────────────────────────────────────────────────────────
async function syncToCloud(uid) {
  if (!db) return;
  try {
    await setDoc(doc(db, "users", uid), {
      collection: state.collection,
      wishlist: state.wishlist,
      wishStores: state.wishStores,
      updatedAt: new Date().toISOString()
    });
  } catch(e) { console.log('Sync error:', e); }
}
async function loadFromCloud(uid) {
  if (!db) return;
  try {
    const snap = await getDoc(doc(db, "users", uid));
    if (snap.exists()) {
      const d = snap.data();
      if (d.collection?.length) state.collection = d.collection;
      if (d.wishlist?.length)   state.wishlist   = d.wishlist;
      if (d.wishStores)         state.wishStores = d.wishStores;
    }
  } catch(e) { console.log('Load error:', e); }
}

// ── Backend API ───────────────────────────────────────────────────────────────
async function apiFetch(endpoint, body) {
  const r = await fetch(getBackend() + endpoint, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body), signal: AbortSignal.timeout(60000)
  });
  const data = await r.json();
  if (data.erro) throw new Error(data.erro);
  return data;
}

async function checkBackend() {
  try {
    await fetch(getBackend() + "/api/health", { signal: AbortSignal.timeout(8000), mode:"no-cors" });
    return true;
  } catch { return false; }
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function callClaude(messages, system, maxTokens=1200) {
  const r = await fetch(CLAUDE_API, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages })
  });
  const d = await r.json();
  return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}

const PERFUME_SYS = `Especialista em perfumaria. Retorne APENAS JSON válido sem markdown:
{"nome":"string","marca":"string","ano":number,"perfumista":"string","familia":"string","genero":"Masculino|Feminino|Unissex","concentracao":"EDP|EDT|Parfum|EDC|Extrait","notas_topo":[{"nome":"string","peso":number}],"notas_coracao":[{"nome":"string","peso":number}],"notas_fundo":[{"nome":"string","peso":number}],"acordes":[{"nome":"string","porcentagem":number}],"descricao":"string","longevidade":"Fraca|Moderada|Boa|Excelente","projecao":"Íntima|Moderada|Forte|Bestial","fragrantica_nota":number,"votos_comunidade":number,"estacoes":["string"],"horarios":["string"],"ocasioes":["string"],"preco_usd":number}`;

async function claudeFetchPerfume(query) {
  const raw = await callClaude(
    [{role:"user",content:`Dados completos do Fragrantica para: "${query}". Use seu conhecimento real do site.`}],
    PERFUME_SYS, 1500
  );
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); } catch { return null; }
}

async function claudeReadImage(b64, mt) {
  const raw = await callClaude(
    [{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mt,data:b64}},
      {type:"text",text:"Esta é uma imagem do Fragrantica ou de um frasco de perfume. Extraia TODOS os dados visíveis e retorne o JSON completo do perfume."}
    ]}],
    PERFUME_SYS, 1500
  );
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); } catch { return null; }
}

async function buildProfile(perfumes) {
  const sys = `Especialista em perfumaria. JSON apenas:
{"familias":[{"nome":"string","porcentagem":number}],"acordes":[{"nome":"string","porcentagem":number}],
"notas_topo_fav":["string"],"notas_coracao_fav":["string"],"notas_fundo_fav":["string"],
"resumo":"string","personalidade":"string","estacoes_pref":["string"],"horarios_pref":["string"],
"ocasioes_pref":["string"],"dna_olfativo":["string"],"caracteristicas":["string"],"evitar":["string"]}`;
  const lista = perfumes.map(p=>
    `${p.nome}(${p.marca}) nota:${p.minha_nota??0}/10 família:${p.familia} acordes:[${p.acordes?.slice(0,4).map(a=>a.nome).join(",")}] topo:[${p.notas_topo?.map(n=>n.nome).join(",")}] fundo:[${p.notas_fundo?.map(n=>n.nome).join(",")}]`
  ).join("\n");
  const raw = await callClaude([{role:"user",content:`Coleção:\n${lista}`}], sys, 1500);
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); } catch { return null; }
}

async function matchPerfume(p, profile) {
  const sys = `JSON: {"porcentagem":number,"razao":"string","pontos_fortes":["string"],"pontos_fracos":["string"]}`;
  const raw = await callClaude([{role:"user",content:`Perfil:${JSON.stringify(profile)}\nPerfume:${JSON.stringify({nome:p.nome,familia:p.familia,acordes:p.acordes?.slice(0,5),estacoes:p.estacoes})}`}], sys, 400);
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); } catch { return {porcentagem:50,razao:"—",pontos_fortes:[],pontos_fracos:[]}; }
}

async function discoverPerfumes(profile, collection) {
  const sys = `JSON array de 6 perfumes reais do Fragrantica:
[{"nome":"string","marca":"string","razao":"string","familia":"string","notas_principais":["string"],"porcentagem":number,"concentracao":"string","estacoes":["string"]}]`;
  const raw = await callClaude([{role:"user",content:`Perfil:${JSON.stringify(profile)}\nNão recomendar:${collection.map(p=>p.nome).join(",")}`}], sys, 1200);
  try { const p=JSON.parse(raw.replace(/```json|```/g,"").trim()); return Array.isArray(p)?p:[]; } catch { return []; }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const ACCORD_COLORS = {
  "Cítrico":"#F9A825","Amadeirado":"#8B6914","Floral":"#E91E63","Oriental":"#7B1FA2",
  "Aquático":"#0277BD","Fougère":"#2E7D32","Gourmand":"#BF360C","Couro":"#795548",
  "Aromático":"#00695C","Almiscarado":"#9E9E9E","Baunilha":"#D4A017","Defumado":"#546E7A",
  "Verde":"#66BB6A","Especiado":"#FF7043","Frutal":"#F06292","Patchouli":"#4A148C",
  "Âmbar":"#FF8F00","Empudrado":"#CE93D8","Herbáceo":"#AED581","Fresco":"#00ACC1",
  "Woody":"#8B6914","Musky":"#9E9E9E","Citrus":"#F9A825","Powdery":"#CE93D8","Fresh":"#00ACC1",
};
function accordColor(name) {
  if (!name) return "#888";
  const l = name.toLowerCase();
  for (const [k,c] of Object.entries(ACCORD_COLORS)) if (l.includes(k.toLowerCase())) return c;
  const h = [...name].reduce((a,c)=>a+c.charCodeAt(0),0);
  return `hsl(${(h*47)%360},52%,45%)`;
}
const NOTE_EMOJIS = {bergamot:"🍋",bergamota:"🍋",toranja:"🍊",grapefruit:"🍊",limão:"🍋",lemon:"🍋",orange:"🍊",laranja:"🍊",vanilla:"🍦",baunilha:"🍦",musk:"🌫️",almíscar:"🌫️",sandalwood:"🪵",sândalo:"🪵",cedar:"🌲",cedro:"🌲",vetiver:"🌿",patchouli:"🍂",rose:"🌹",rosa:"🌹",jasmine:"🌸",jasmim:"🌸",iris:"💜",íris:"💜",orris:"💜",amber:"✨",âmbar:"✨",ginger:"🫚",gengibre:"🫚",pepper:"🌶️",pimenta:"🌶️",magnolia:"🌺",magnólia:"🌺",vanilla:"🍦",incense:"🕯️",wood:"🪵",madeira:"🪵"};
function noteEmoji(n){const l=(n||"").toLowerCase();for(const[k,v]of Object.entries(NOTE_EMOJIS))if(l.includes(k))return v;return"🌿";}
const SEASON_IC = {Primavera:"🌸",Verão:"☀️",Outono:"🍂",Inverno:"❄️",Spring:"🌸",Summer:"☀️",Fall:"🍂",Winter:"❄️"};
const TIME_IC   = {Manhã:"🌅",Tarde:"🌞",Noite:"🌙",Morning:"🌅",Day:"🌞",Evening:"🌙",Night:"🌙"};
const OCC_IC    = {Casual:"👕",Escritório:"💼",Social:"🎉",Romântico:"❤️",Especial:"⭐",Esportivo:"🏃"};

// ── Render helpers ────────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") e.className = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}
function dots() {
  const w = el("span", {className:"dots", style:{display:"inline-flex",gap:"3px",alignItems:"center"}});
  [0,1,2].forEach(i=>{const s=el("span");s.style.animationDelay=`${i*0.2}s`;w.appendChild(s);});
  return w;
}
function accordBar(name, pct, max) {
  const color = accordColor(name);
  const w = Math.min(100, Math.round((pct/(max||100))*100));
  const wrap = el("div",{className:"accord-bar-wrap"});
  const row  = el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"3px"}});
  row.appendChild(el("span",{style:{fontSize:"12px",color:"#ddd"}},name));
  row.appendChild(el("span",{style:{fontSize:"11px",color,fontWeight:"700"}},Math.round(pct)+"%"));
  const bg   = el("div",{className:"accord-bar-bg"});
  const fill = el("div",{className:"accord-bar-fill",style:{width:"0%",background:color}});
  bg.appendChild(fill); wrap.appendChild(row); wrap.appendChild(bg);
  setTimeout(()=>{ fill.style.width=w+"%"; }, 50);
  return wrap;
}
function noteChip(note, sm=false) {
  const nm = typeof note==="string"?note:note?.nome||"";
  const emoji = noteEmoji(nm);
  return el("span",{className:"note-chip"+(sm?" note-chip-sm":"")},
    el("span",{style:{fontSize:sm?"12px":"14px"}},emoji), nm);
}
function sBadge(label, icon) {
  return el("span",{className:"sbadge"},icon," ",label);
}
function bottle(nome, marca, color, imagem, size=52) {
  const c = color||accordColor(nome);
  if (imagem) {
    const wrap = el("div",{style:{width:size+"px",height:(size*1.4)+"px",borderRadius:"8px",overflow:"hidden",flexShrink:"0",border:`1.5px solid ${c}55`,background:"#0a0a0a"}});
    const img  = el("img",{src:imagem,alt:nome,style:{width:"100%",height:"100%",objectFit:"contain"}});
    img.onerror = ()=>{ wrap.replaceWith(bottle(nome,marca,color,null,size)); };
    wrap.appendChild(img); return wrap;
  }
  const b = el("div",{style:{width:size+"px",height:(size*1.4)+"px",borderRadius:(size*.13)+"px",flexShrink:"0",background:`linear-gradient(145deg,${c}33,${c}99,${c}cc)`,border:`1.5px solid ${c}88`,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",boxShadow:`0 4px 14px ${c}44`}});
  const hl  = el("div",{style:{position:"absolute",top:"0",left:"10%",width:"28%",height:"50%",background:"rgba(255,255,255,0.22)",borderRadius:"0 0 50% 50%"}});
  const nk  = el("div",{style:{position:"absolute",top:"0",left:"28%",width:"44%",height:"20%",background:`${c}dd`,borderRadius:"3px 3px 0 0"}});
  const cp  = el("div",{style:{position:"absolute",top:"0",left:"23%",width:"54%",height:"10%",background:"#D4A843",borderRadius:"3px 3px 0 0"}});
  const ini = el("div",{style:{fontSize:(size*.28)+"px",color:"rgba(255,255,255,0.9)",fontWeight:"700",zIndex:"1",marginBottom:(size*.06)+"px"}},(nome||"?")[0].toUpperCase());
  const br  = el("div",{style:{fontSize:(size*.1)+"px",color:"rgba(255,255,255,0.5)",textTransform:"uppercase",zIndex:"1",marginBottom:(size*.06)+"px",maxWidth:"90%",overflow:"hidden",textAlign:"center",textOverflow:"ellipsis",whiteSpace:"nowrap"}},(marca||"").slice(0,10));
  [hl,nk,cp,ini,br].forEach(x=>b.appendChild(x)); return b;
}
function ring(value, max=100, color, label, size=60) {
  const pct = Math.min(1, value/max);
  const r   = (size-10)/2;
  const circ= 2*Math.PI*r;
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size); svg.setAttribute("height",size);
  svg.style.transform = "rotate(-90deg)";
  const bg = document.createElementNS("http://www.w3.org/2000/svg","circle");
  bg.setAttribute("cx",size/2); bg.setAttribute("cy",size/2); bg.setAttribute("r",r);
  bg.setAttribute("fill","none"); bg.setAttribute("stroke","#1e1e1e"); bg.setAttribute("stroke-width","5");
  const fg = document.createElementNS("http://www.w3.org/2000/svg","circle");
  fg.setAttribute("cx",size/2); fg.setAttribute("cy",size/2); fg.setAttribute("r",r);
  fg.setAttribute("fill","none"); fg.setAttribute("stroke",color); fg.setAttribute("stroke-width","5");
  fg.setAttribute("stroke-dasharray",`${pct*circ} ${circ}`); fg.setAttribute("stroke-linecap","round");
  fg.style.transition = "stroke-dasharray 1s ease";
  svg.appendChild(bg); svg.appendChild(fg);
  const wrap = el("div",{className:"ring-wrap"});
  const box  = el("div",{style:{position:"relative",width:size+"px",height:size+"px"}});
  const num  = el("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:(size*.22)+"px",fontWeight:"700",color}},Math.round(value)+"");
  box.appendChild(svg); box.appendChild(num);
  wrap.appendChild(box);
  wrap.appendChild(el("span",{style:{fontSize:"10px",color:"#555"}},label));
  return wrap;
}

// ── Fetch perfume (tries backend first, falls back to Claude) ─────────────────
async function fetchPerfume(req) {
  // Try backend first
  if (state.backendOk) {
    try {
      if (req.type==="name")   return await apiFetch("/api/perfume/search", {query:req.value});
      if (req.type==="url")    return await apiFetch("/api/perfume/url",    {url:req.value});
    } catch(e) { console.log("Backend failed, falling back to Claude:", e); }
  }
  // Fallback to Claude
  if (req.type==="image") {
    return await claudeReadImage(req.value, req.mediaType);
  }
  if (req.type==="url") {
    // Extract perfume name from URL and ask Claude
    const m = req.value.match(/\/([^/]+)-(\d+)\.html/);
    const query = m ? m[1].replace(/-/g," ") : req.value;
    return await claudeFetchPerfume(query);
  }
  return await claudeFetchPerfume(req.value);
}

// ── Main search flow ──────────────────────────────────────────────────────────
async function doPreview(req, isWishlist) {
  setState({loadingSearch:true, errorMsg:""});
  try {
    let data = await fetchPerfume(req);
    if (!data || !data.nome) throw new Error("Perfume não encontrado. Tente com o nome completo ou a URL do Fragrantica.");
    setState({preview:{data, isWishlist}, loadingSearch:false});
  } catch(e) {
    setState({loadingSearch:false, errorMsg:e.message||"Erro ao buscar."});
  }
}

async function doConfirm() {
  const {preview} = state;
  if (!preview) return;
  const item = {...preview.data, id:Date.now(), minha_nota:0};
  if (preview.isWishlist) {
    state.wishlist = [item, ...state.wishlist];
    if (state.profile) {
      const m = await matchPerfume(item, state.profile);
      state.wishMatches = {...state.wishMatches, [item.id]:m};
    }
  } else {
    state.collection = [item, ...state.collection];
    state.profile = null;
  }
  saveLocal();
  if (state.user?.uid) syncToCloud(state.user.uid);
  setState({preview:null});
}

async function doBRPrice(id, nome, marca) {
  setState({loadingPriceId:id});
  try {
    const r = await apiFetch("/api/price/br", {nome, marca});
    const upd = list => list.map(p=>p.id===id?{...p,preco_brl:r.preco_brl,preco_fonte:r.fonte}:p);
    state.collection = upd(state.collection);
    state.wishlist   = upd(state.wishlist);
    saveLocal();
  } catch {}
  setState({loadingPriceId:null});
}

async function doProfile() {
  setState({loadingProfile:true, errorMsg:""});
  try {
    const p = await buildProfile(state.collection);
    state.profile = p;
    const ms = {};
    for (const w of state.wishlist) ms[w.id] = await matchPerfume(w, p);
    state.wishMatches = ms;
  } catch { setState({errorMsg:"Erro ao gerar perfil."}); }
  setState({loadingProfile:false});
}

async function doDiscover() {
  setState({loadingDiscover:true, errorMsg:""});
  try { state.discoveries = await discoverPerfumes(state.profile, state.collection); }
  catch { setState({errorMsg:"Erro ao buscar sugestões."}); }
  setState({loadingDiscover:false});
}

function moveToCollection(id) {
  const p = state.wishlist.find(w=>w.id===id); if(!p) return;
  state.wishlist   = state.wishlist.filter(w=>w.id!==id);
  const nm = {...state.wishMatches}; delete nm[id]; state.wishMatches = nm;
  state.collection = [{...p,id:Date.now()}, ...state.collection];
  state.profile = null;
  saveLocal();
  render();
}

// ── Google Login ──────────────────────────────────────────────────────────────
async function googleLogin() {
  if (!auth) { alert("Configure o Firebase primeiro nas instruções."); return; }
  try {
    const provider = new GoogleAuthProvider();
    const result   = await signInWithPopup(auth, provider);
    const user = result.user;
    setState({user:{name:user.displayName, email:user.email, photo:user.photoURL, uid:user.uid}, showLogin:false});
    await loadFromCloud(user.uid);
    render();
  } catch(e) { console.log("Login error:", e); }
}

async function doLogout() {
  if (auth) await signOut(auth);
  setState({user:null});
}

function buildAddForm(isWishlist) {
  const wrap = el("div",{style:{marginBottom:"16px"}});

  const camRef  = el("input",{type:"file",accept:"image/*",capture:"environment",style:{display:"none"}});

  const pills = el("div",{style:{display:"flex",gap:"5px",marginBottom:"10px"}});
  const modeData = [["text","✏ Nome"],["url","🔗 URL"],["photo","📷 Foto"]];
  let pillBtns = [];
  modeData.forEach(([m,l],i)=>{
    const b = el("button",{style:{flex:"1",padding:"8px 4px",borderRadius:"9px",border:"none",cursor:"pointer",background:m==="text"?"linear-gradient(135deg,#D4A843,#8B6914)":"#141414",color:m==="text"?"#000":"#555",fontSize:"10px",fontWeight:m==="text"?"700":"400",fontFamily:"Georgia,serif"}},l);
    b.onclick = ()=>{
      mode = m; pillBtns.forEach((pb,pi)=>{
        pb.style.background = pi===i?"linear-gradient(135deg,#D4A843,#8B6914)":"#141414";
        pb.style.color = pi===i?"#000":"#555";
        pb.style.fontWeight = pi===i?"700":"400";
      });
      updateForm();
    };

  });
  wrap.appendChild(pills);

  const formArea = el("div");
  wrap.appendChild(formArea);
  wrap.appendChild(fileRef); wrap.appendChild(camRef);

  function handleFile(e) {
    const f = e.target.files?.[0]; if(!f) return;
    const mt = f.type||"image/jpeg";
    const r  = new FileReader();
    r.onload = ev => doPreview({type:"image",value:ev.target.result.split(",")[1],mediaType:mt}, isWishlist);
    r.readAsDataURL(f); e.target.value="";
  }
  fileRef.onchange = handleFile; camRef.onchange = handleFile;

  function updateForm() {
    formArea.innerHTML = "";
    if (mode==="text") {
      const row = el("div",{style:{display:"flex",gap:"8px"}});
      const inp = el("input",{type:"text",placeholder:isWishlist?"Ex: Oud Wood Tom Ford...":"Ex: Sospiro Vibrato EDP...",className:"input-dark",style:{flex:"1"}});

      const btn = el("button",{className:"btn-gold",style:{flexShrink:"0",padding:"11px 14px"}});
      btn.appendChild(state.loadingSearch?dots():document.createTextNode("Buscar"));
      btn.onclick = ()=>{ if(inp.value.trim()) doPreview({type:"name",value:inp.value.trim()},isWishlist); };
      row.appendChild(inp); row.appendChild(btn); formArea.appendChild(row);
      // Manual fallback button
      const fallback = el("button",{style:{width:"100%",marginTop:"8px",background:"none",border:"1px solid #252525",borderRadius:"8px",color:"#777",padding:"7px",cursor:"pointer",fontSize:"10px",fontFamily:"Georgia,serif"}},"📋 Adicionar manualmente (sem internet)");
      fallback.onclick = ()=>setState({showAddManual:true, addManualTarget:isWishlist?"wishlist":"collection"});
      formArea.appendChild(fallback);
    }
    if (mode==="url") {
      const row = el("div",{style:{display:"flex",gap:"8px"}});
      const inp = el("input",{type:"text",placeholder:"https://www.fragrantica.com/perfume/...",className:"input-dark",style:{flex:"1",fontSize:"11px"}});
      inp.onkeydown = e=>{ if(e.key==="Enter"&&inp.value.includes("fragrantica")) doPreview({type:"url",value:inp.value.trim()},isWishlist); };
      const btn = el("button",{className:"btn-gold",style:{flexShrink:"0",padding:"11px 12px"}});
      btn.appendChild(state.loadingSearch?dots():document.createTextNode("Buscar"));
      btn.onclick = ()=>{ if(inp.value.includes("fragrantica")) doPreview({type:"url",value:inp.value.trim()},isWishlist); };
      row.appendChild(inp); row.appendChild(btn); formArea.appendChild(row);
      const hint = el("div",{style:{fontSize:"10px",color:"#444",marginTop:"5px",fontStyle:"italic"}},"Cole a URL do Fragrantica → dados 100% precisos");
      formArea.appendChild(hint);
    }
    if (mode==="photo") {
      const grid = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});

  const fields = [
    ["nome","Nome do perfume","text"],
    ["marca","Marca","text"],
    ["familia","Família (ex: Amadeirado Floral)","text"],
    ["concentracao","Concentração (EDP, EDT...)","text"],
    ["ano","Ano","number"],
    ["fragrantica_nota","Nota Fragrantica (0-5)","number"],
    ["notas_raw","Notas (separadas por vírgula)","text"],
  ];
  const vals = {};
  fields.forEach(([key,ph,type])=>{
    const inp = el("input",{type,placeholder:ph,className:"input-dark",style:{marginBottom:"8px"}});
    inp.oninput = ()=>{ vals[key]=inp.value; };
    box.appendChild(inp);
  });

  const row = el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginTop:"8px"}});
  const cancel = el("button",{className:"btn-ghost",style:{width:"100%"}},"Cancelar");
  cancel.onclick = ()=>setState({showAddManual:false});
  const save = el("button",{className:"btn-gold",style:{width:"100%"}},"✦ Adicionar");
  save.onclick = ()=>{
    if (!vals.nome?.trim()) { alert("Nome obrigatório"); return; }
    const notas = (vals.notas_raw||"").split(",").map(n=>({nome:n.trim(),peso:7})).filter(n=>n.nome);
    const item = {
      id: Date.now(), minha_nota: 0,
      nome: vals.nome?.trim()||"",
      marca: vals.marca?.trim()||"",
      familia: vals.familia?.trim()||"Não classificada",
      concentracao: vals.concentracao?.trim()||"EDP",
      ano: parseInt(vals.ano)||new Date().getFullYear(),
      fragrantica_nota: parseFloat(vals.fragrantica_nota)||0,
      notas_topo: notas.slice(0,3),
      notas_coracao: notas.slice(3,6),
      notas_fundo: notas.slice(6),
      acordes: [],
      estacoes: [], horarios: [],
    };
    if (state.addManualTarget==="wishlist") state.wishlist = [item,...state.wishlist];
    else state.collection = [item,...state.collection];
    saveLocal();
    setState({showAddManual:false, profile:null});
  };
  row.appendChild(cancel); row.appendChild(save);
  box.appendChild(row); ov.appendChild(box); return ov;
}

    const rval= el("span",{style:{fontSize:"20px",fontWeight:"700",color:nc,fontFamily:"Georgia,serif"}},nota+"");
    rrow.appendChild(rval);
    const slider = el("input",{type:"range",min:"0",max:"10",step:"1",value:nota+"",style:{width:"100%",cursor:"pointer",accentColor:nc}});
    slider.oninput = e=>{
      const v=Number(e.target.value);
      rval.textContent=v+"";
      const newC=v===0?"#333":v>=8?"#4CAF50":v>=6?"#D4A843":v>=4?"#FF9800":"#e57373";
      rval.style.color=newC; slider.style.accentColor=newC;
      onRating(p.id,v);
    };
    rw.appendChild(rrow); rw.appendChild(slider); body.appendChild(rw);
  }

  // Match
  if(showMatch&&match){
    const mb=el("div",{style:{background:"#0a0d0a",border:"1px solid #1a2a1a",borderRadius:"10px",padding:"10px",marginTop:"10px"}});
    const mr=el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"5px"}});

    mr.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"700",color:match.porcentagem>=70?"#4CAF50":match.porcentagem>=50?"#D4A843":"#e57373"}},Math.round(match.porcentagem)+"%"));
    const mbg=el("div",{style:{height:"5px",background:"#181818",borderRadius:"3px",overflow:"hidden",marginBottom:"7px"}});
    const mfg=el("div",{style:{width:`${match.porcentagem}%`,height:"100%",background:match.porcentagem>=70?"#4CAF50":match.porcentagem>=50?"#D4A843":"#e57373",borderRadius:"3px",transition:"width 1s"}});
    mbg.appendChild(mfg); mb.appendChild(mr); mb.appendChild(mbg);
    mb.appendChild(el("p",{style:{fontSize:"11px",color:"#666",margin:"0 0 5px",fontStyle:"italic",lineHeight:"1.5"}},match.razao||""));
    body.appendChild(mb);
  }

  // Accords
  if(p.acordes?.length){
    const al=el("div",{style:{marginTop:"12px"}});
    al.appendChild(el("div",{style:{fontSize:"9px",color:"#444",textTransform:"uppercase",letterSpacing:".12em",marginBottom:"8px"}},"Acordes"));
    p.acordes.slice(0,6).forEach(a=>al.appendChild(accordBar(a.nome,a.porcentagem,maxA)));
    body.appendChild(al);
  }

  // Seasons
  if((p.estacoes?.length||p.horarios?.length)){
    const sl=el("div",{style:{marginTop:"10px",display:"flex",flexWrap:"wrap",gap:"4px"}});
    (p.estacoes||[]).forEach(s=>sl.appendChild(sBadge(s,SEASON_IC[s]||"🌟")));
    (p.horarios||[]).forEach(h=>sl.appendChild(sBadge(h,TIME_IC[h]||"⏰")));
    body.appendChild(sl);
  }

  // Notes
  [["notas_topo","#D4A843","TOPO"],["notas_coracao","#E91E63","CORAÇÃO"],["notas_fundo","#9C27B0","FUNDO"]].forEach(([key,col,lbl])=>{
    if(p[key]?.length){
      const nd=el("div",{style:{marginTop:"9px"}});
      nd.appendChild(el("div",{style:{fontSize:"9px",color:col,marginBottom:"4px"}},lbl));
      p[key].forEach(n=>nd.appendChild(noteChip(n,true)));
      body.appendChild(nd);
    }
  });

  // Prices
  if(p.preco_usd>0||p.preco_brl>0){
    const pr=el("div",{style:{display:"flex",gap:"8px",marginTop:"12px"}});
    if(p.preco_usd>0){const pd=el("div",{style:{flex:"1",background:"#0d0d0d",borderRadius:"8px",padding:"6px 10px",textAlign:"center"}});pd.appendChild(el("div",{style:{fontSize:"9px",color:"#444",textTransform:"uppercase"}},"USD"));pd.appendChild(el("div",{style:{fontSize:"13px",color:"#ccc",fontWeight:"700"}},`US$ ${p.preco_usd}`));pr.appendChild(pd);}
    if(p.preco_brl>0){const pb=el("div",{style:{flex:"1",background:"#060e06",border:"1px solid #152015",borderRadius:"8px",padding:"6px 10px",textAlign:"center"}});pb.appendChild(el("div",{style:{fontSize:"9px",color:"#2E7D32",textTransform:"uppercase"}},"Brasil"));pb.appendChild(el("div",{style:{fontSize:"13px",color:"#4CAF50",fontWeight:"700"}},`R$ ${p.preco_brl}`));if(p.preco_fonte)pb.appendChild(el("div",{style:{fontSize:"9px",color:"#2E7D32"}},p.preco_fonte));pr.appendChild(pb);}
    body.appendChild(pr);
  }

  if(p.descricao) body.appendChild(el("p",{style:{fontSize:"11px",color:"#666",fontStyle:"italic",fontFamily:"Georgia,serif",lineHeight:"1.6",margin:"10px 0 0"}},`"${p.descricao}"`));

  if(extraFooter) body.appendChild(extraFooter);

  if(onDelete){
    const db2=el("button",{style:{width:"100%",background:"none",border:"1px solid #2a1515",borderRadius:"8px",color:"#5a2020",padding:"7px",cursor:"pointer",fontSize:"11px",fontFamily:"Georgia,serif",marginTop:"12px"}},"Remover");
    db2.onclick=()=>onDelete(p.id);
    body.appendChild(db2);
  }

  hdr.onclick=()=>{
    open=!open;
    body.style.display=open?"block":"none";
    arr.style.transform=open?"rotate(180deg)":"none";
  };
  card.appendChild(hdr); card.appendChild(body);
  return card;
}

      wrap.appendChild(buildCard(p,{
        onDelete: id=>{state.wishlist=state.wishlist.filter(x=>x.id!==id);const nm={...state.wishMatches};delete nm[id];state.wishMatches=nm;saveLocal();render();},
        onRating: (id,v)=>{state.wishlist=state.wishlist.map(x=>x.id===id?{...x,minha_nota:v}:x);saveLocal();},
        showMatch:!!state.profile, match:state.wishMatches[p.id],
        extraFooter:ef
      }));
    });
  }
  return wrap;
}

function buildProfile() {
  const wrap=el("div");
  wrap.appendChild(el("div",{className:"section-label"},"Perfil Olfativo"));
  if(state.collection.length<2){
    const empty=el("div",{style:{textAlign:"center",padding:"40px 16px"}});
    empty.appendChild(el("div",{style:{fontSize:"40px",marginBottom:"12px"}},"🌸"));
    empty.appendChild(el("div",{style:{fontSize:"12px",fontStyle:"italic",color:"#333"}},"Adicione ao menos 2 perfumes à coleção."));
    wrap.appendChild(empty); return wrap;
  }
  const pb=el("button",{className:"btn-gold",style:{width:"100%",padding:"13px",borderRadius:"12px",marginBottom:"18px",fontSize:"13px",letterSpacing:".05em"}});
  if(state.loadingProfile){pb.style.background="#141414";pb.style.color="#444";pb.appendChild(dots());pb.appendChild(document.createTextNode(" Analisando..."));}
  else pb.textContent="✦ Gerar / Atualizar Perfil";
  pb.onclick=doProfile; wrap.appendChild(pb);

  if(!state.profile) return wrap;
  const pf=state.profile;

  // Summary
  const sum=el("div",{style:{background:"#0c0900",border:"1px solid #2a1f00",borderRadius:"14px",padding:"14px",marginBottom:"12px"}});
  sum.appendChild(el("div",{style:{fontSize:"9px",color:"#8B6914",letterSpacing:".18em",textTransform:"uppercase",marginBottom:"8px"}},"Resumo"));
  sum.appendChild(el("p",{style:{fontSize:"12px",color:"#ccc",fontStyle:"italic",lineHeight:"1.8",margin:"0"}},pf.resumo||""));
  if(pf.personalidade) sum.appendChild(el("p",{style:{fontSize:"11px",color:"#777",lineHeight:"1.6",margin:"8px 0 0"}},pf.personalidade));
  wrap.appendChild(sum);

  // DNA
  if(pf.dna_olfativo?.length){
    const dna=el("div",{style:{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:"12px",padding:"12px",marginBottom:"12px"}});
    dna.appendChild(el("div",{style:{fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:".12em",marginBottom:"8px"}},"DNA Olfativo"));
    pf.dna_olfativo.forEach(d=>{
      const c=accordColor(d);
      dna.appendChild(el("span",{style:{display:"inline-block",background:`${c}22`,border:`1px solid ${c}44`,borderRadius:"20px",padding:"4px 12px",fontSize:"12px",color:c,margin:"2px 4px 2px 0",fontFamily:"Georgia,serif"}},d));
    });
    wrap.appendChild(dna);
  }

  // Families
  if(pf.familias?.length){
    const fam=el("div",{style:{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:"12px",padding:"12px",marginBottom:"12px"}});
    fam.appendChild(el("div",{style:{fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:".12em",marginBottom:"10px"}},"Famílias Preferidas"));
    const maxF=Math.max(...pf.familias.map(x=>x.porcentagem));
    pf.familias.slice(0,6).forEach(f=>fam.appendChild(accordBar(f.nome,f.porcentagem,maxF)));
    wrap.appendChild(fam);
  }

  // Accords
  if(pf.acordes?.length){
    const ac=el("div",{style:{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:"12px",padding:"12px",marginBottom:"12px"}});
    ac.appendChild(el("div",{style:{fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:".12em",marginBottom:"10px"}},"Acordes Dominantes"));
    const maxA=Math.max(...pf.acordes.map(x=>x.porcentagem));
    pf.acordes.slice(0,8).forEach(a=>ac.appendChild(accordBar(a.nome,a.porcentagem,maxA)));
    wrap.appendChild(ac);
  }

  // Notes by layer
  [["notas_topo_fav","#D4A843","Notas de Topo Favoritas"],["notas_coracao_fav","#E91E63","Notas de Coração Favoritas"],["notas_fundo_fav","#9C27B0","Notas de Fundo Favoritas"]].forEach(([k,c,l])=>{
    if(pf[k]?.length){
      const nd=el("div",{style:{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:"12px",padding:"12px",marginBottom:"12px"}});
      nd.appendChild(el("div",{style:{fontSize:"9px",color:c,textTransform:"uppercase",letterSpacing:".12em",marginBottom:"8px"}},l));
      pf[k].forEach(n=>nd.appendChild(noteChip(n)));
      wrap.appendChild(nd);
    }
  });

  // When/where
  if(pf.estacoes_pref?.length||pf.horarios_pref?.length||pf.ocasioes_pref?.length){
    const ww=el("div",{style:{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:"12px",padding:"12px",marginBottom:"12px"}});
    ww.appendChild(el("div",{style:{fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:".12em",marginBottom:"8px"}},"Quando e Onde Usar"));
    (pf.estacoes_pref||[]).forEach(s=>ww.appendChild(sBadge(s,SEASON_IC[s]||"🌟")));
    (pf.horarios_pref||[]).forEach(h=>ww.appendChild(sBadge(h,TIME_IC[h]||"⏰")));
    (pf.ocasioes_pref||[]).forEach(o=>ww.appendChild(sBadge(o,OCC_IC[o]||"✨")));
    wrap.appendChild(ww);
  }

  // Loves/avoids
  if(pf.caracteristicas?.length){
    const lv=el("div",{style:{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:"12px",padding:"12px",marginBottom:"12px"}});
    lv.appendChild(el("div",{style:{fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:".12em",marginBottom:"8px"}},"Você ama"));
    pf.caracteristicas.forEach(c=>{const d=el("div",{style:{fontSize:"12px",color:"#bbb",padding:"5px 0",borderBottom:"1px solid #111"}},`✦ ${c}`);lv.appendChild(d);});
    wrap.appendChild(lv);
  }
  if(pf.evitar?.length){
    const av=el("div",{style:{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:"12px",padding:"12px"}});
    av.appendChild(el("div",{style:{fontSize:"9px",color:"#555",textTransform:"uppercase",letterSpacing:".12em",marginBottom:"8px"}},"Tende a evitar"));
    pf.evitar.forEach(c=>{const d=el("div",{style:{fontSize:"12px",color:"#444",padding:"5px 0",borderBottom:"1px solid #111"}},`○ ${c}`);av.appendChild(d);});
    wrap.appendChild(av);
  }
  return wrap;
}

function buildDiscover() {
  const wrap=el("div");
  wrap.appendChild(el("div",{className:"section-label"},"Descobrir Perfumes"));
  if(!state.profile){
    const empty=el("div",{style:{textAlign:"center",padding:"40px 16px"}});
    empty.appendChild(el("div",{style:{fontSize:"40px",marginBottom:"12px"}},"🔭"));
    empty.appendChild(el("div",{style:{fontSize:"12px",fontStyle:"italic",color:"#333",marginBottom:"16px"}},"Gere seu Perfil Olfativo primeiro."));
    const gb=el("button",{style:{background:"none",border:"1px solid #222",borderRadius:"8px",color:"#D4A843",padding:"9px 18px",cursor:"pointer",fontSize:"12px",fontFamily:"Georgia,serif"}},"→ Ir para Perfil");
    gb.onclick=()=>setState({tab:2});
    empty.appendChild(gb); wrap.appendChild(empty); return wrap;
  }
  const db=el("button",{style:{width:"100%",padding:"13px",borderRadius:"12px",background:state.loadingDiscover?"#141414":"linear-gradient(135deg,#534AB7,#3C3489)",border:"none",color:state.loadingDiscover?"#444":"#E8E4FF",fontSize:"13px",fontWeight:"700",cursor:state.loadingDiscover?"not-allowed":"pointer",fontFamily:"Georgia,serif",marginBottom:"18px"}});
  if(state.loadingDiscover){db.appendChild(dots());db.appendChild(document.createTextNode(" Buscando..."));}
  else db.textContent="✦ Buscar Sugestões para Mim";
  db.onclick=doDiscover; wrap.appendChild(db);

  if(!state.discoveries.length&&!state.loadingDiscover){
    wrap.appendChild(el("div",{style:{textAlign:"center",padding:"16px",color:"#333",fontSize:"12px",fontStyle:"italic"}},"Clique para receber sugestões."));
  }
  state.discoveries.forEach((d,i)=>{
    const fc=accordColor(d.familia);
    const card=el("div",{style:{background:"#0d0d0d",border:`1px solid ${fc}44`,borderRadius:"14px",padding:"12px",marginBottom:"10px"}});
    const hrow=el("div",{style:{display:"flex",gap:"12px",alignItems:"flex-start",marginBottom:"10px"}});
    hrow.appendChild(bottle(d.nome,d.marca,fc,null,46));
    const info=el("div",{style:{flex:"1",minWidth:"0"}});
    info.appendChild(el("div",{style:{fontFamily:"Georgia,serif",fontSize:"13px",color:"#F0E6C8",fontWeight:"600"}},d.nome));
    info.appendChild(el("div",{style:{fontSize:"10px",color:"#666",marginTop:"1px"}},`${d.marca} · ${d.familia}`));
    info.appendChild(el("div",{style:{fontSize:"11px",marginTop:"2px"}},(d.estacoes||[]).slice(0,3).map(s=>SEASON_IC[s]||"").join(" ")));
    hrow.appendChild(info);
    hrow.appendChild(el("div",{style:{background:`${fc}22`,border:`1px solid ${fc}55`,borderRadius:"20px",padding:"4px 10px",fontSize:"13px",color:fc,fontWeight:"700",flexShrink:"0"}},Math.round(d.porcentagem)+"%"));
    card.appendChild(hrow);
    const bar=el("div",{style:{height:"5px",background:"#1a1a1a",borderRadius:"3px",overflow:"hidden",marginBottom:"8px"}});
    const fill=el("div",{style:{width:"0%",height:"100%",background:fc,borderRadius:"3px",transition:"width 1s"}});
    bar.appendChild(fill); card.appendChild(bar);
    setTimeout(()=>{fill.style.width=d.porcentagem+"%";},50+i*100);
    card.appendChild(el("p",{style:{fontSize:"11px",color:"#777",margin:"0 0 8px",fontStyle:"italic",lineHeight:"1.5"}},d.razao||""));
    if(d.notas_principais?.length){const nw=el("div",{style:{marginBottom:"8px"}});d.notas_principais.forEach(n=>nw.appendChild(noteChip(n,true)));card.appendChild(nw);}
    const ab=el("button",{style:{background:"none",border:"1px solid #222",borderRadius:"8px",color:"#D4A843",padding:"7px 14px",cursor:"pointer",fontSize:"11px",fontFamily:"Georgia,serif"}},"+ Wishlist");
    ab.onclick=()=>doPreview({type:"name",value:`${d.nome} ${d.marca}`},true);
    card.appendChild(ab); wrap.appendChild(card);
  });
  return wrap;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadLocal();
render();
checkBackend().then(ok=>setState({backendOk:ok}));

if (auth) {
  onAuthStateChanged(auth, async user=>{
    if (user) {
      state.user = {name:user.displayName,email:user.email,photo:user.photoURL,uid:user.uid};
      await loadFromCloud(user.uid);
      render();
    }
  });
}
</script>
